[project]
name = "agentmesh-studio"
version = "0.1.0"
description = "Developer tools for AgentMesh"
authors = [{ name = "AgentMesh Contributors" }]
requires-python = ">=3.10"
dependencies = [
    "typer>=0.15.0",
    "rich>=13.9.0",
]

[project.scripts]
agentmesh = "agentmesh.studio.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
